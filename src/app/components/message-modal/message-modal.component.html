@if (visible) {
  <div class="modal-overlay" (click)="onCancel()">
    <div class="modal-panel" (click)="$event.stopPropagation()">

      <div class="modal-header">
        <div class="modal-title-group">
          <span class="material-symbols-outlined modal-title-icon">
            {{ isEdit ? 'edit_note' : 'add_comment' }}
          </span>
          <h2 class="modal-title">{{ isEdit ? 'Edit Message' : 'New Message' }}</h2>
        </div>
        <button class="modal-close-btn" (click)="onCancel()" aria-label="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="modal-divider"></div>

      <form class="modal-form" (ngSubmit)="submit()">

        <div class="form-row">
          <div class="form-field">
            <label class="form-label" for="message_id">Id</label>
            <input class="form-input" id="message_id" type="text" [(ngModel)]="form.message_id" name="message_id" placeholder="1" required />
          </div>
          <div class="form-field">
            <label class="form-label" for="author">Author</label>
            <input class="form-input" id="author" type="text" [(ngModel)]="form.author" name="author" placeholder="e.g. Amilkar" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label class="form-label" for="chat">Chat</label>
            <input class="form-input" id="chat" type="text" [(ngModel)]="form.chat" name="chat" placeholder="e.g. #general" />
          </div>
        </div>

        <div class="form-field">
          <label class="form-label" for="text">Message</label>
          <textarea class="form-input form-textarea" id="text" [(ngModel)]="form.text" name="text" placeholder="Write the message content..." rows="4" required></textarea>
        </div>

        <div class="modal-actions">
          <button class="btn-secondary" type="button" (click)="onCancel()">Cancel</button>
          <button class="btn-primary" type="submit">
            <span class="material-symbols-outlined">{{ isEdit ? 'save' : 'add' }}</span>
            {{ isEdit ? 'Save Changes' : 'Create' }}
          </button>
        </div>

      </form>
    </div>
  </div>
}
