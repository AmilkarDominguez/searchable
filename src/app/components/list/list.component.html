@if (loading()) {
  <span class="loader"></span>
} @else {
  <section class="list-container">
    <section class="glass-card">
      <section class="items-wrapper">
        @for (message of messages(); track message) {
          <app-card [message]="message"></app-card>
        }
      </section>
    </section>
  </section>
}
